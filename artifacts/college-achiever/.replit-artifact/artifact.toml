kind = "web"
previewPath = "/"
title = "College Achiever"
version = "1.0.0"
id = "artifacts/college-achiever"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22896

[services.development]
run = "pnpm --filter @workspace/college-achiever run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/college-achiever", "run", "build" ]
publicDir = "artifacts/college-achiever/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22896"
BASE_PATH = "/"
